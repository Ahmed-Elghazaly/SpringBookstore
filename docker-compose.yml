services:
  bookstore-postgres:
    build: ./database
    container_name: bookstore-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bookstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql

  bookstore-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookstore-backend
    ports:
      - "8080:8080"
    depends_on:
      - bookstore-postgres

  bookstore-frontend:
    build: ./frontend
    container_name: bookstore-frontend
    ports:
      - "3000:80"
    depends_on:
      - bookstore-backend

volumes:
  pgdata: