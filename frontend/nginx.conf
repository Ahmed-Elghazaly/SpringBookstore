server {
    listen 80;

    # 1. Serve the React App
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;

        # This fixes the "Refresh 404" error for React Router
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy API calls to the Backend Container
    # This avoids CORS errors and "localhost" confusion
    location /api {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    # Proxy other root-level backend routes
    location /books {
        proxy_pass http://backend:8080;
    }
    location /customers {
        proxy_pass http://backend:8080;
    }
    location /publisher-orders {
        proxy_pass http://backend:8080;
    }
}